<!DOCTYPE html><html lang="zh-CN"><head><meta name="generator" content="Hexo 3.9.0"><meta http-equiv="content-type" content="text/html; charset=utf-8"><meta name="viewport" content="width=device-width, initial-scale=0.5"><link rel="stylesheet" href="/css/post.css"><link rel="icon" href="/img/favicon.png"><title>Makefile中:= = ?= +=有什么区别</title><link rel="alternate" href="/atom.xml" title="INLOW开发博客" type="application/atom+xml">
</head><body>　　<div class="inner"><h2>Makefile中:= = ?= +=有什么区别</h2><ul>
<li>:= 是最基本的赋值，即在赋值时就将所有的符号都解释出来，如下边例子：</li>
</ul>
<a id="more"></a>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">x := x</span><br><span class="line">y := $(x) y</span><br><span class="line">x := z</span><br><span class="line"></span><br><span class="line">all:</span><br><span class="line">	echo &quot;y is&quot; $(y)</span><br></pre></td></tr></table></figure>
<pre><code><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">y is x y</span><br></pre></td></tr></table></figure>
</code></pre><ul>
<li><p>= 用于递归扩展变量，具体如下边例子所示：</p>
<figure class="highlight makefile"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">x = x</span><br><span class="line">y = <span class="variable">$(x)</span> y</span><br><span class="line">x = z</span><br><span class="line"></span><br><span class="line"><span class="section">all:</span></span><br><span class="line">	echo <span class="string">"y is"</span> <span class="variable">$(y)</span></span><br></pre></td></tr></table></figure>
  <figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">y is z y</span><br></pre></td></tr></table></figure>
</li>
<li><p>?= 若左边变量没有被赋值就将右边值赋给左边，例子如下：</p>
<figure class="highlight makefile"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">x ?= x</span><br><span class="line">y ?= <span class="variable">$(x)</span> y</span><br><span class="line">x ?= z</span><br><span class="line"></span><br><span class="line"><span class="section">all:</span></span><br><span class="line">	echo <span class="string">"y is"</span> <span class="variable">$(y)</span>, <span class="string">"x is"</span> <span class="variable">$(x)</span></span><br></pre></td></tr></table></figure>
  <figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">y is x y, x is x</span><br></pre></td></tr></table></figure>
</li>
<li><p>+= 这个就相当于累加了，和C里的+=基本一致，但要注意的是这里的=和上边的递归扩展赋值一样，不是简单赋值。</p>
<figure class="highlight makefile"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">x += x</span><br><span class="line">y += <span class="variable">$(x)</span> y</span><br><span class="line">x += z</span><br><span class="line"></span><br><span class="line"><span class="section">all:</span></span><br><span class="line">	echo <span class="string">"y is"</span> <span class="variable">$(y)</span>, <span class="string">"x is"</span> <span class="variable">$(x)</span></span><br></pre></td></tr></table></figure>
  <figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">y is x z y, x is x z</span><br></pre></td></tr></table></figure>
</li>
</ul>
</div><script src="/js/jquery.min.js"></script><script src="/js/main.js"></script></body></html>
